d_jsons.json",},}; function t(key){ return (TEXT[lang] && TEXT[lang][key]) || TEXT.ru[key] || key;} function applyTheme(){ const theme=localStorage.getItem("theme") || "light"; document.documentElement.classList.toggle( "dark-mode", theme==="dark", ); document.body.classList.toggle("dark-mode", theme==="dark"); scheduleResize();} function escapeHtml(value){ return String(value).replace(/[&<>"']/g, function (char){ return{ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",}[char];});} let resizeFrameRequest=null; function resizeFrame(){ resizeFrameRequest=null; if (!window.frameElement) return; const container=document.querySelector(".container"); const bodyStyles=window.getComputedStyle(document.body); const verticalPadding=parseFloat(bodyStyles.paddingTop || "0") + parseFloat(bodyStyles.paddingBottom || "0"); const contentHeight=container ? Math.ceil(container.getBoundingClientRect().height) : Math.ceil(document.body.getBoundingClientRect().height); const nextHeight=Math.max(contentHeight + verticalPadding + 24, 1200); if (window.frameElement.style.height !==`${nextHeight}px`){ window.frameElement.style.height=`${nextHeight}px`;}} function scheduleResize(){ if (resizeFrameRequest !==null) return; resizeFrameRequest=window.requestAnimationFrame(resizeFrame);} function getSavedJsons(){ try{ const raw=localStorage.getItem(STORAGE_KEYS.saves); const parsed=raw ? JSON.parse(raw) :{}; return parsed && typeof parsed==="object" && !Array.isArray(parsed) ? parsed :{};} catch (error){ return{};}} function setSavedJsons(savedJsons){ localStorage.setItem(STORAGE_KEYS.saves, JSON.stringify(savedJsons));} function getDraft(){ try{ const raw=localStorage.getItem(STORAGE_KEYS.draft); const parsed=raw ? JSON.parse(raw) : null; return parsed && typeof parsed==="object" ? parsed : null;} catch (error){ return null;}} function setDraft(){ const draft={ rows: Array.from( document.querySelectorAll("#announcement-table-body tr"), ).map(function (row){ return{ name: row.querySelector(".announcement-name").value, id: row.querySelector(".announcement-id").value,};}), output: document.getElementById("output").value, input: document.getElementById("input-json").value,}; localStorage.setItem(STORAGE_KEYS.draft, JSON.stringify(draft));} let notificationTimer=null; function showNotification(message, type){ const notification=document.getElementById("notification"); notification.textContent=message; notification.className=type==="error" ? "error" : "success"; notification.classList.add("show"); window.clearTimeout(notificationTimer); notificationTimer=window.setTimeout(function (){ notification.classList.remove("show");}, 3000); scheduleResize();} function compressString(str){ const uint8Array=new TextEncoder().encode(str); const compressed=pako.deflate(uint8Array); let binary=""; const chunkSize=0x8000; for (let index=0; index < compressed.length; index +=chunkSize){ binary +=String.fromCharCode.apply( null, compressed.subarray(index, index + chunkSize), );} return btoa(binary);} function decompressString(str){ const binaryString=atob(str); const compressed=new Uint8Array( binaryString.split("").map(function (char){ return char.charCodeAt(0);}), ); return pako.inflate(compressed,{ to: "string"});} function createRow(name, audioId){ const row=document.createElement("tr"); row.innerHTML=` <td><input type="text" class="announcement-name w-full p-2 border rounded-lg" placeholder="${escapeHtml(t("stop_name_placeholder"))}" value="${escapeHtml(name || "")}"></td><td><input type="number" min="0" step="1" class="announcement-id w-full p-2 border rounded-lg" placeholder="${escapeHtml(t("audio_id_placeholder"))}" value="${escapeHtml(audioId || "")}"></td><td><button type="button" class="remove-row bg-red-500 text-white p-2 rounded-lg hover:bg-red-600 w-full">${escapeHtml(t("row_remove"))}</button></td>`; row.querySelector(".remove-row").addEventListener("click", function (){ row.remove(); if (!document.querySelector("#announcement-table-body tr")){ addAnnouncementRow();} setDraft(); scheduleResize();}); row.querySelectorAll("input").forEach(function (input){ input.addEventListener("input", function (){ setDraft();});}); return row;} function addAnnouncementRow(name, audioId){ const tableBody=document.getElementById("announcement-table-body"); tableBody.appendChild(createRow(name, audioId)); setDraft(); scheduleResize();} function clearTable(){ document.getElementById("announcement-table-body").innerHTML="";} function buildAnnouncements(){ const announcements={}; const rows=document.querySelectorAll("#announcement-table-body tr"); for (const row of rows){ const name=row.querySelector(".announcement-name").value.trim(); const idRaw=row.querySelector(".announcement-id").value.trim(); if (!name && !idRaw){ continue;} const id=Number(idRaw); if (!name || idRaw==="" || !Number.isInteger(id) || id < 0){ throw new Error(t("invalid_row"));} announcements[name]=id;} return announcements;} function populateFromAnnouncements(announcements){ clearTable(); Object.entries(announcements).forEach(function (entry){ addAnnouncementRow(entry[0], entry[1]);}); if (!Object.keys(announcements).length){ addAnnouncementRow();} setDraft(); scheduleResize();} function generateJson(){ try{ const announcements=buildAnnouncements(); document.getElementById("output").value=JSON.stringify( announcements, null, 4, ); setDraft(); if (!Object.keys(announcements).length){ showNotification(t("generated_empty"), "success");}} catch (error){ showNotification(error.message || t("invalid_row"), "error");}} async function copyJson(){ const output=document.getElementById("output"); if (!output.value.trim()){ showNotification(t("no_json_to_copy"), "error"); return;} try{ if (navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(output.value);} else{ const textarea=document.createElement("textarea"); textarea.value=output.value; textarea.style.position="fixed"; textarea.style.opacity="0"; document.body.appendChild(te const actions=document.createElement("div"); actions.className="flex space-x-2"; const loadButton=document.createElement("button"); loadButton.className="bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700 text-sm"; loadButton.textContent=t("load_saved_btn"); loadButton.addEventListener("click", function (){ loadSavedJson(name);}); const deleteButton=document.createElement("button"); deleteButton.className="bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 text-sm"; deleteButton.textContent=t("delete_saved_btn"); deleteButton.addEventListener("click", function (){ deleteSavedJson(name);}); actions.appendChild(loadButton); actions.appendChild(deleteButton); item.appendChild(title); item.appendChild(actions); list.appendChild(item);}); scheduleResize();} function openLoadModal(){ document.getElementById("loadModal").style.display="flex"; renderSavedJsonsList();} function closeLoadModal(){ document.getElementById("loadModal").style.display="none"; document.getElementById("importFile").value=""; scheduleResize();} function saveJson(){ const name=document.getElementById("saveName").value.trim(); const json=document.getElementById("output").value.trim(); if (name.length >50){ showNotification(t("save_name_long"), "error"); return;} if (!name || !json){ showNotification(t("save_name_empty"), "error"); return;} try{ const parsed=JSON.parse(json); const savedJsons=getSavedJsons(); savedJsons[name]=compressString(JSON.stringify(parsed)); setSavedJsons(savedJsons); closeSaveModal(); showNotification(t("json_saved"), "success");} catch (error){ showNotification(t("invalid_json"), "error");}} function loadSavedJson(name){ try{ const savedJsons=getSavedJsons(); const compressedJson=savedJsons[name]; if (!compressedJson){ showNotification(t("invalid_json"), "error"); return;} const decompressedJson=decompressString(compressedJson); document.getElementById("input-json").value=decompressedJson; loadJsonFromTextarea(); closeLoadModal();} catch (error){ showNotification(t("invalid_json"), "error");}} function deleteSavedJson(name){ const savedJsons=getSavedJsons(); delete savedJsons[name]; setSavedJsons(savedJsons); renderSavedJsonsList(); showNotification(t("json_deleted"), "success");} function exportJsons(){ const jsonData=JSON.stringify(getSavedJsons(), null, 2); const blob=new Blob([jsonData],{ type: "application/json"}); const url=URL.createObjectURL(blob); const link=document.createElement("a"); link.href=url; link.download=t("export_file_name"); link.click(); URL.revokeObjectURL(url); showNotification(t("json_exported"), "success");} function importJsons(){ const fileInput=document.getElementById("importFile"); const file=fileInput.files[0]; if (!file){ showNotification(t("no_file"), "error"); return;} const reader=new FileReader(); reader.onload=function (event){ try{ const parsed=JSON.parse(event.target.result); if ( !parsed || typeof parsed !=="object" || Array.isArray(parsed) ){ throw new Error(t("invalid_file"));} Object.values(parsed).forEach(function (value){ if (typeof value !=="string"){ throw new Error(t("invalid_file"));}}); setSavedJsons(parsed); renderSavedJsonsList(); showNotification(t("json_imported"), "success");} catch (error){ showNotification(t("invalid_file"), "error");}}; reader.onerror=function (){ showNotification(t("file_read_error"), "error");}; reader.readAsText(file);} function applyTranslations(){ document.documentElement.lang=lang; document.title=t("document_title"); const textMap={ "page-title": "page_title", "column-name": "column_name", "column-id": "column_id", "column-action": "column_action", "add-announcement": "add_announcement", "generate-json": "generate_json", "copy-json": "copy_json", "save-json": "save_json", "load-json": "load_json", "load-saved": "load_saved", "instructions-title": "instructions_title", "save-modal-title": "save_modal_title", "save-modal-note": "save_modal_note", "save-modal-confirm": "save_modal_confirm", "save-modal-cancel": "save_modal_cancel", "load-modal-title": "load_modal_title", "export-jsons": "export_jsons", "load-modal-close": "load_modal_close",}; Object.entries(textMap).forEach(function (entry){ const element=document.getElementById(entry[0]); if (element){ element.textContent=t(entry[1]);}}); document.getElementById("saveName").placeholder=t( "save_modal_placeholder", ); document.getElementById("output").placeholder=t("output_placeholder"); document.getElementById("input-json").placeholder=t("input_placeholder"); const importLabel=document.getElementById("import-label"); const importInput=document.getElementById("importFile"); if (importLabel && importInput){ importLabel.textContent=t("import_jsons"); importLabel.appendChild(importInput);} for (let index=1; index <=6; index +=1){ const node=document.getElementById(`instruction-${index}`); if (node){ node.innerHTML=t(`instruction_${index}`);}}} function restoreDraft(){ const draft=getDraft(); if (draft && Array.isArray(draft.rows) && draft.rows.length){ draft.rows.forEach(function (row){ addAnnouncementRow(row.name || "", row.id || "");}); document.getElementById("output").value=draft.output || ""; document.getElementById("input-json").value=draft.input || ""; return;} addAnnouncementRow();} function init(){ applyTheme(); applyTranslations(); restoreDraft(); document .getElementById("add-announcement") .addEventListener("click", function (){ addAnnouncementRow();}); document .getElementById("generate-json") .addEventListener("click", generateJson); document .getElementById("copy-json") .addEventListener("click", copyJson); document .getElementById("load-json") .addEventListener("click", loadJsonFromTextarea); document .getElementById("save-json") .addEventListener("click", openSaveModal); document .getElementById("load-saved") .addEventListener("click", openLoadModal); document .getElementById("save-modal-confirm") .addEventListener("click", saveJson); document .getElementById("save-modal-cancel") .addEventListener("click", closeSaveModal); document .getElementById("load-modal-close") .addEventListener("click", closeLoadModal); document .getElementById("export-jsons") .addEventListener("click", exportJsons); document .getElementById("importFile") .addEventListener("change", importJsons); document .getElementById("input-json") .addEventListener("input", setDraft); document.getElementById("output").addEventListener("input", setDraft); document.querySelectorAll(".modal").forEach(function (modal){ modal.addEventListener("click", function (event){ if (event.target===modal){ modal.style.display="none"; scheduleResize();}});}); window.addEventListener("load", scheduleResize); window.addEventListener("resize", scheduleResize); window.addEventListener("storage", function (event){ if (!event.key || event.key==="theme"){ applyTheme();}}); document.addEventListener("visibilitychange", function (){ if (!document.hidden){ applyTheme();}}); if (window.ResizeObserver){ const observer=new ResizeObserver(scheduleResize); observer.observe(document.querySelector(".container") || document.body);} scheduleResize();} document.addEventListener("DOMContentLoaded", init); </script><script src="../../../scripts/consent-config.js"></script><script src="../../../scripts/consent-manager.js"></script></body></html>
